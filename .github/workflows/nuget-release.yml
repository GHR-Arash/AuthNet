name: NuGet Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: nuget-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Verify, pack, and publish packages
    runs-on: windows-latest
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/master'

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify and pack
        shell: pwsh
        run: .\scripts\verify.ps1

      - name: Verify publication metadata
        shell: pwsh
        run: .\scripts\verify-package-metadata.ps1 -RequirePublicPublicationMetadata

      - name: Publish to NuGet
        shell: pwsh
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NUGET_API_KEY)) {
            throw 'Missing GitHub secret NUGET_API_KEY.'
          }

          .\scripts\publish-nuget.ps1 -ApiKey $env:NUGET_API_KEY -SkipDuplicate
